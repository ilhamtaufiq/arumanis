name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Tests temporarily skipped — re-enable test:ci + test:e2e when ready
      - name: Build
        run: bun run build

      - name: Smoke test
        run: bun run smoke

      - name: Route permission audit
        run: bun run audit:routes