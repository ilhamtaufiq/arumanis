<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" role="img" aria-label="Integrasi Arumanis dengan SPSE, SIPD, Web Pengawasan, dan Mobile Pengawas">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="api" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a5b4fc"/>
    </marker>
    <style>
      .title { font: 700 36px 'Segoe UI', system-ui, sans-serif; fill: #fff; }
      .subtitle { font: 500 16px 'Segoe UI', system-ui, sans-serif; fill: #c7d2fe; }
      .hub-title { font: 800 28px 'Segoe UI', system-ui, sans-serif; fill: #fff; }
      .hub-sub { font: 600 14px 'Segoe UI', system-ui, sans-serif; fill: #fce7f3; }
      .card-title { font: 700 18px 'Segoe UI', system-ui, sans-serif; fill: #0f172a; }
      .card-sub { font: 500 13px 'Segoe UI', system-ui, sans-serif; fill: #475569; }
      .chip { font: 700 11px 'Segoe UI', system-ui, sans-serif; fill: #fff; }
      .flow { font: 600 12px 'Segoe UI', system-ui, sans-serif; fill: #c7d2fe; }
      .foot { font: 500 12px 'Segoe UI', system-ui, sans-serif; fill: #94a3b8; }
      .api-t { font: 700 16px 'Segoe UI', system-ui, sans-serif; fill: #fff; }
      .api-s { font: 500 12px 'Segoe UI', system-ui, sans-serif; fill: #e0f2fe; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="140" r="120" fill="#7c3aed" opacity="0.12"/>
  <circle cx="1260" cy="720" r="160" fill="#ec4899" opacity="0.10"/>
  <circle cx="1100" cy="120" r="90" fill="#22d3ee" opacity="0.08"/>

  <!-- Title -->
  <text x="700" y="58" text-anchor="middle" class="title">Integrasi Ekosistem Arumanis</text>
  <text x="700" y="88" text-anchor="middle" class="subtitle">Portal www/bun  ·  SPSE  ·  SIPD  ·  Web Pengawasan  ·  Mobile Pengawas</text>

  <!-- Flow lines (behind cards) -->
  <!-- hub center 700, 430 -->
  <!-- SPSE top-left 220, 250 -->
  <path d="M 340 280 C 480 300, 560 360, 620 400" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)" opacity="0.9"/>
  <!-- SIPD top-right 1180, 250 -->
  <path d="M 1060 280 C 920 300, 840 360, 780 400" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)" opacity="0.9"/>
  <!-- Web bottom-left 220, 640 -->
  <path d="M 340 600 C 480 560, 560 500, 620 470" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)" opacity="0.9"/>
  <!-- Mobile bottom-right 1180, 640 -->
  <path d="M 1060 600 C 920 560, 840 500, 780 470" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)" opacity="0.9"/>
  <!-- hub to APIAMIS down -->
  <path d="M 700 510 L 700 575" fill="none" stroke="#67e8f9" stroke-width="3.5" marker-end="url(#arrow)"/>

  <!-- Bidirectional subtle reverse hints -->
  <text x="430" y="320" class="flow">paket · kontrak</text>
  <text x="900" y="320" class="flow" text-anchor="end">renja · rincian</text>
  <text x="430" y="560" class="flow">SSO handoff</text>
  <text x="900" y="560" class="flow" text-anchor="end">Bearer · realtime</text>
  <text x="715" y="555" class="flow">BFF / API</text>

  <!-- ===== SPSE card ===== -->
  <g filter="url(#soft)" transform="translate(80,170)">
    <rect width="280" height="200" rx="24" fill="url(#card)"/>
    <rect width="280" height="8" rx="4" fill="#f59e0b"/>
    <!-- icon building/procurement -->
    <g transform="translate(28,36)">
      <rect x="0" y="18" width="52" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <rect x="8" y="28" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.7"/>
      <rect x="22" y="28" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.5"/>
      <rect x="36" y="28" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.7"/>
      <path d="M8 18 L26 4 L44 18" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
    <text x="100" y="58" class="card-title">SPSE / LPSE</text>
    <text x="100" y="80" class="card-sub">inaproc · pengadaan</text>
    <text x="28" y="118" class="card-sub">Sync paket LPSE</text>
    <text x="28" y="140" class="card-sub">Push data kontrak</text>
    <text x="28" y="162" class="card-sub">Session cookie SPSE</text>
    <rect x="28" y="176" width="100" height="22" rx="11" fill="#f59e0b"/>
    <text x="78" y="191" text-anchor="middle" class="chip">Procurement</text>
  </g>

  <!-- ===== SIPD card ===== -->
  <g filter="url(#soft)" transform="translate(1040,170)">
    <rect width="280" height="200" rx="24" fill="url(#card)"/>
    <rect width="280" height="8" rx="4" fill="#10b981"/>
    <!-- icon documents/budget -->
    <g transform="translate(28,36)">
      <rect x="6" y="8" width="40" height="52" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
      <line x1="14" y1="22" x2="38" y2="22" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="32" x2="38" y2="32" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="42" x2="30" y2="42" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="50" r="10" fill="#10b981"/>
      <text x="40" y="54" text-anchor="middle" font-size="12" font-weight="800" fill="#fff" font-family="Segoe UI,sans-serif">$</text>
    </g>
    <text x="100" y="58" class="card-title">SIPD</text>
    <text x="100" y="80" class="card-sub">sipd-lite · Renja</text>
    <text x="28" y="118" class="card-sub">Cache Renja &amp; rincian</text>
    <text x="28" y="140" class="card-sub">Proxy BFF /bff/sipd/*</text>
    <text x="28" y="162" class="card-sub">Anggaran sub kegiatan</text>
    <rect x="28" y="176" width="88" height="22" rx="11" fill="#10b981"/>
    <text x="72" y="191" text-anchor="middle" class="chip">Anggaran</text>
  </g>

  <!-- ===== HUB Arumanis ===== -->
  <g filter="url(#glow)" transform="translate(540,340)">
    <rect width="320" height="170" rx="28" fill="url(#hub)"/>
    <!-- browser chrome illustration -->
    <g transform="translate(24,22)">
      <rect width="110" height="72" rx="10" fill="#fff" opacity="0.18"/>
      <circle cx="16" cy="16" r="4" fill="#fda4af"/>
      <circle cx="28" cy="16" r="4" fill="#fde68a"/>
      <circle cx="40" cy="16" r="4" fill="#86efac"/>
      <rect x="12" y="28" width="86" height="8" rx="3" fill="#fff" opacity="0.35"/>
      <rect x="12" y="42" width="60" height="8" rx="3" fill="#fff" opacity="0.22"/>
      <rect x="12" y="56" width="72" height="8" rx="3" fill="#fff" opacity="0.15"/>
    </g>
    <text x="150" y="52" class="hub-title">Arumanis</text>
    <text x="150" y="76" class="hub-sub">Portal www/bun</text>
    <text x="24" y="120" class="hub-sub">SPA React · BFF session</text>
    <text x="24" y="142" class="hub-sub">Integrasi · SPM · Kontrak · SPAM</text>
    <rect x="24" y="154" width="120" height="22" rx="11" fill="#fff" opacity="0.22"/>
    <text x="84" y="169" text-anchor="middle" class="chip">Hub Operasional</text>
  </g>

  <!-- ===== APIAMIS bar ===== -->
  <g filter="url(#soft)" transform="translate(420,590)">
    <rect width="560" height="72" rx="20" fill="url(#api)"/>
    <g transform="translate(28,16)">
      <rect x="0" y="4" width="40" height="32" rx="8" fill="#fff" opacity="0.2"/>
      <path d="M8 20 h24 M20 12 v16" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="90" y="36" class="api-t">APIAMIS · Backend Laravel</text>
    <text x="90" y="56" class="api-s">Auth · bisnis · Reverb realtime · sinkron SPSE/SIPD · API mobile</text>
  </g>

  <!-- ===== Web Pengawasan ===== -->
  <g filter="url(#soft)" transform="translate(80,700)">
    <rect width="280" height="150" rx="24" fill="url(#card)"/>
    <rect width="280" height="8" rx="4" fill="#6366f1"/>
    <!-- desktop monitor -->
    <g transform="translate(28,28)">
      <rect x="0" y="0" width="56" height="38" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
      <rect x="6" y="8" width="44" height="22" rx="3" fill="#6366f1" opacity="0.25"/>
      <rect x="18" y="40" width="20" height="6" rx="2" fill="#6366f1"/>
      <rect x="10" y="46" width="36" height="4" rx="2" fill="#a5b4fc"/>
    </g>
    <text x="100" y="50" class="card-title">Web Pengawasan</text>
    <text x="100" y="72" class="card-sub">www/pengawas</text>
    <text x="28" y="100" class="card-sub">Dashboard &amp; progres lapangan</text>
    <text x="28" y="120" class="card-sub">SSO dari Arumanis · /pengawasan</text>
    <rect x="28" y="132" width="72" height="22" rx="11" fill="#6366f1"/>
    <text x="64" y="147" text-anchor="middle" class="chip">Web App</text>
  </g>

  <!-- ===== Mobile ===== -->
  <g filter="url(#soft)" transform="translate(1040,700)">
    <rect width="280" height="150" rx="24" fill="url(#card)"/>
    <rect width="280" height="8" rx="4" fill="#ec4899"/>
    <!-- phone -->
    <g transform="translate(36,26)">
      <rect x="0" y="0" width="32" height="56" rx="7" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
      <rect x="6" y="10" width="20" height="32" rx="3" fill="#ec4899" opacity="0.25"/>
      <circle cx="16" cy="48" r="3" fill="#ec4899"/>
    </g>
    <text x="90" y="50" class="card-title">Mobile Pengawas</text>
    <text x="90" y="72" class="card-sub">Expo / React Native</text>
    <text x="28" y="100" class="card-sub">Foto · penerima · offline-ready</text>
    <text x="28" y="120" class="card-sub">Bearer token · presence GPS</text>
    <rect x="28" y="132" width="78" height="22" rx="11" fill="#ec4899"/>
    <text x="67" y="147" text-anchor="middle" class="chip">Mobile App</text>
  </g>

  <!-- Center bottom note -->
  <text x="700" y="870" text-anchor="middle" class="foot">Arumanis sebagai portal pusat · APIAMIS sebagai backend tunggal · kanal pengawasan web &amp; mobile terhubung SSO/token</text>
</svg>
