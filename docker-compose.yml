name: arumanis-stack

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
        VITE_PENGAWAS_APP_BASE_URL: ${VITE_PENGAWAS_APP_BASE_URL:-/pengawasan}
        VITE_OPENROUTER_API_KEY: ${VITE_OPENROUTER_API_KEY:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_DOMAINS: ${VITE_UMAMI_DOMAINS:-arumanis.cianjur.space}
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-8080}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ../apiamis
      dockerfile: Dockerfile
    environment:
      APP_NAME: apiamis
      APP_ENV: ${APIAMIS_APP_ENV:-local}
      APP_KEY: ${APIAMIS_APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_DEBUG: ${APIAMIS_APP_DEBUG:-true}
      APP_URL: ${APIAMIS_APP_URL:-http://localhost:8000}
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: ${APIAMIS_LOG_LEVEL:-debug}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-apiamis}
      DB_USERNAME: ${MYSQL_USER:-apiamis}
      DB_PASSWORD: ${MYSQL_PASSWORD:-apiamis}
      SESSION_DRIVER: database
      SESSION_LIFETIME: 720
      SESSION_ENCRYPT: false
      SESSION_PATH: /
      SESSION_DOMAIN: null
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3000,127.0.0.1:3000}
      SANCTUM_TOKEN_EXPIRATION: 720
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      MAIL_MAILER: log
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - apiamis_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-apiamis}
      MYSQL_USER: ${MYSQL_USER:-apiamis}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apiamis}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  migrate:
    build:
      context: ../apiamis
      dockerfile: Dockerfile
    profiles:
      - tools
    environment:
      APP_NAME: apiamis
      APP_ENV: ${APIAMIS_APP_ENV:-local}
      APP_KEY: ${APIAMIS_APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_DEBUG: ${APIAMIS_APP_DEBUG:-true}
      APP_URL: ${APIAMIS_APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-apiamis}
      DB_USERNAME: ${MYSQL_USER:-apiamis}
      DB_PASSWORD: ${MYSQL_PASSWORD:-apiamis}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
    command: php artisan migrate --force
    volumes:
      - apiamis_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  apiamis_storage:
