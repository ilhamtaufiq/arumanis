<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Panduan Arumanis</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Panduan penggunaan Arumanis — Air Minum & Sanitasi Kabupaten Cianjur">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --ink: #111111;
      --paper: #fffdf8;
      --accent: #fb8500;
      --sky: #8ecae6;
      --rose: #f9bbd1;
      --mint: #b7e4c7;
      --muted: rgba(17, 17, 17, 0.68);
      --shadow: 4px 4px 0 0 var(--ink);
      --theme-color: var(--accent);
      --base-font-size: 16px;
      --docs-header-height: 74px;
      --docs-bg-base: #f0ebe0;
      --docs-gradient:
        radial-gradient(ellipse 90% 60% at 10% -5%, rgba(249, 187, 209, 0.65), transparent 72%),
        radial-gradient(ellipse 80% 55% at 95% 0%, rgba(142, 202, 230, 0.6), transparent 70%),
        radial-gradient(ellipse 75% 50% at 90% 105%, rgba(183, 228, 199, 0.45), transparent 74%),
        radial-gradient(ellipse 70% 45% at 0% 100%, rgba(251, 133, 0, 0.16), transparent 72%),
        linear-gradient(180deg, #fffdf8 0%, #f7f3ea 30%, #f0ebe0 58%, #ebe4d8 100%);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      height: auto !important;
      background-color: #ebe4d8 !important;
      background-image: var(--docs-gradient) !important;
      background-attachment: fixed !important;
      background-repeat: no-repeat !important;
      background-size: 100% 100% !important;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--ink);
      position: relative;
      min-height: 100vh;
      height: auto !important;
      margin: 0;
      background: transparent !important;
      background-color: transparent !important;
    }

    #docs-page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: #ebe4d8;
      background-image: var(--docs-gradient);
    }

    main {
      display: block !important;
      position: relative !important;
      width: 100% !important;
      max-width: 100% !important;
      min-height: calc(100vh - var(--docs-header-height)) !important;
      height: auto !important;
      background: transparent !important;
      background-color: transparent !important;
    }

    section.content,
    .content {
      position: relative !important;
      top: auto !important;
      right: auto !important;
      bottom: auto !important;
      left: auto !important;
      margin-left: 300px !important;
      width: auto !important;
      max-width: none !important;
      min-width: 0 !important;
      min-height: calc(100vh - var(--docs-header-height));
      padding-top: 0 !important;
      background: transparent !important;
      background-color: transparent !important;
      transition: margin-left 0.25s ease-out;
      overflow-x: clip;
    }

    body.close section.content,
    body.close .content {
      margin-left: 0 !important;
    }

    .markdown-section,
    section.cover,
    .sidebar-toggle,
    #app {
      background: transparent !important;
      background-color: transparent !important;
    }

    body.ready main {
      display: block !important;
      position: relative !important;
      width: 100% !important;
      max-width: 100% !important;
      min-height: calc(100vh - var(--docs-header-height)) !important;
      height: auto !important;
      background: transparent !important;
    }

    body.ready section.content,
    body.ready .content {
      position: relative !important;
      top: auto !important;
      right: auto !important;
      bottom: auto !important;
      left: auto !important;
      margin-left: 300px !important;
      width: auto !important;
      max-width: none !important;
      min-height: calc(100vh - var(--docs-header-height));
      padding-top: 0 !important;
      background: transparent !important;
      transition: margin-left 0.25s ease-out;
    }

    body.ready.close section.content,
    body.ready.close .content {
      margin-left: 0 !important;
    }

    body.ready .markdown-section,
    body.ready section.cover,
    body.ready .sidebar-toggle,
    #app {
      background: transparent !important;
      background-color: transparent !important;
    }

    .docs-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      background: var(--paper);
      border-bottom: 3px solid var(--ink);
      box-shadow: var(--shadow);
    }

    .docs-header__brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--ink);
      min-width: 0;
    }

    .docs-header__brand img {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
    }

    .docs-header__title {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .docs-header__title strong {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .docs-header__title span {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .docs-header__actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .docs-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.55rem 0.9rem;
      border: 3px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none !important;
      box-shadow: var(--shadow);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .docs-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 0 var(--ink);
    }

    .docs-btn--primary {
      background: var(--accent);
    }

    .docs-btn--sky {
      background: var(--sky);
    }

    #app {
      position: relative;
      z-index: 1;
      padding-top: var(--docs-header-height);
    }

    body.ready .sidebar,
    .sidebar {
      position: fixed !important;
      top: var(--docs-header-height) !important;
      bottom: 0 !important;
      left: 0 !important;
      height: auto !important;
      background: var(--paper) !important;
      border-right: 3px solid var(--ink) !important;
      width: 300px !important;
      max-width: min(300px, 88vw);
      z-index: 30;
      transform: translateX(0);
      transition: transform 0.25s ease-out;
      box-shadow: 4px 0 0 0 var(--ink);
    }

    body.close .sidebar {
      transform: translateX(calc(-100% - 4px)) !important;
    }

    .sidebar-toggle {
      display: none !important;
    }

    .docs-sidebar-backdrop {
      position: fixed;
      top: var(--docs-header-height);
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 25;
      border: 0;
      padding: 0;
      margin: 0;
      background: rgba(17, 17, 17, 0.38);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      cursor: default;
    }

    .docs-sidebar-backdrop.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .docs-header__start {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }

    .docs-btn--menu {
      flex: 0 0 auto;
      padding: 0.5rem 0.75rem;
      background: var(--paper);
    }

    .docs-btn--menu[aria-expanded="true"] {
      background: var(--sky);
    }

    .docs-menu-icon {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      width: 14px;
      height: 12px;
    }

    .docs-menu-icon span {
      display: block;
      height: 2px;
      background: var(--ink);
      border-radius: 1px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .docs-btn--menu[aria-expanded="true"] .docs-menu-icon span:nth-child(1) {
      transform: translateY(5px) rotate(45deg);
    }

    .docs-btn--menu[aria-expanded="true"] .docs-menu-icon span:nth-child(2) {
      opacity: 0;
    }

    .docs-btn--menu[aria-expanded="true"] .docs-menu-icon span:nth-child(3) {
      transform: translateY(-5px) rotate(-45deg);
    }

    .docs-btn__label {
      font-size: 0.72rem;
    }

    @media (min-width: 1025px) {
      .docs-sidebar-backdrop {
        display: none !important;
      }
    }

    .sidebar .app-name {
      display: none;
    }

    .sidebar-nav {
      padding-top: 1rem !important;
    }

    .sidebar ul li a {
      font-weight: 700;
      color: var(--ink) !important;
      border-radius: 0;
      padding: 0.45rem 0.75rem;
    }

    .sidebar ul li a:hover,
    .sidebar ul li.active > a {
      background: var(--sky) !important;
      color: var(--ink) !important;
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 0 var(--ink);
    }

    .sidebar ul li ul li a {
      font-weight: 600;
      color: var(--muted) !important;
    }

    .markdown-section {
      max-width: 860px;
      min-width: 0;
      width: 100%;
      padding: 2rem 2.25rem 4rem;
      overflow-wrap: anywhere;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .markdown-section h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      margin-bottom: 0.5rem;
      line-height: 1.05;
    }

    .markdown-section h2 {
      margin-top: 2.4rem;
      padding-bottom: 0.35rem;
      border-bottom: 3px solid var(--ink);
    }

    .markdown-section h3 {
      margin-top: 1.6rem;
    }

    .markdown-section p,
    .markdown-section li {
      line-height: 1.7;
      color: var(--ink);
    }

    .markdown-section a {
      color: var(--ink);
      font-weight: 700;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .markdown-section a:hover {
      color: var(--accent);
    }

    .markdown-section blockquote {
      border-left: 0;
      margin: 1.25rem 0;
      padding: 1rem 1.1rem;
      background: var(--sky);
      border: 3px solid var(--ink);
      box-shadow: var(--shadow);
    }

    .markdown-section code {
      background: #fff4df;
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 0;
      padding: 0.1rem 0.35rem;
      font-size: 0.92em;
    }

    .markdown-section pre {
      background: var(--ink) !important;
      border: 3px solid var(--ink);
      box-shadow: var(--shadow);
      border-radius: 0;
    }

    .table-responsive {
      width: 100%;
      max-width: 100%;
      margin: 1.25rem 0;
      border: 3px solid var(--ink);
      box-shadow: var(--shadow);
      background: var(--paper);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      min-width: 100%;
      display: table;
      overflow: visible;
      margin: 0;
      table-layout: fixed;
    }

    .table-responsive > table {
      border: 0;
      box-shadow: none;
    }

    .markdown-section table th,
    .markdown-section table td {
      border: 2px solid var(--ink);
      padding: 0.65rem 0.8rem;
      vertical-align: top;
      text-align: left;
      word-break: break-word;
      overflow-wrap: anywhere;
      hyphens: auto;
    }

    .markdown-section table th {
      background: var(--rose);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.82rem;
    }

    .markdown-section table tr:nth-child(even) td {
      background: rgba(142, 202, 230, 0.18);
    }

    .markdown-section hr {
      border: 0;
      border-top: 3px solid var(--ink);
      margin: 2rem 0;
    }

    body:has(section.cover.show) section.content,
    body:has(section.cover.show) .content {
      margin-left: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
    }

    section.cover,
    .cover {
      background: transparent !important;
      background-color: transparent !important;
      color: var(--ink) !important;
      min-height: calc(100vh - var(--docs-header-height)) !important;
      width: 100% !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 2.5rem;
    }

    section.cover.has-mask .mask {
      display: none !important;
    }

    .cover-main {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 0;
    }

    .cover-main > p:empty {
      display: none;
    }

    .cover-main h1:not(.cover-title) {
      display: none;
    }

    .cover-shell {
      width: 100%;
      background: rgba(255, 253, 248, 0.92);
      border: 3px solid var(--ink);
      box-shadow: var(--shadow);
      padding: clamp(1.5rem, 3vw, 2.5rem);
    }

    .cover-hero {
      margin: 0 0 1.75rem;
      text-align: center;
    }

    .cover-main .cover-badge {
      display: inline-block;
      margin: 0 0 1rem;
      padding: 0.35rem 0.75rem;
      background: var(--mint);
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 0 var(--ink);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .cover-main .cover-title,
    .cover-main h1.cover-title {
      font-size: clamp(2rem, 4.8vw, 3.1rem) !important;
      font-weight: 800 !important;
      letter-spacing: -0.03em;
      line-height: 1.05 !important;
      margin: 0 0 0.9rem !important;
      color: var(--ink) !important;
      text-shadow: none !important;
    }

    .cover-main .cover-title a,
    .cover-main h1.cover-title a {
      color: inherit !important;
      text-decoration: none !important;
      pointer-events: none;
    }

    .cover-main .cover-lead {
      display: block !important;
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      max-width: 52ch;
      margin: 0 auto;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.65;
    }

    .cover-main .cover-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.85rem;
      margin: 0 0 1.75rem;
      align-items: stretch;
    }

    .cover-main .cover-card {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      background: var(--paper);
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 0 var(--ink);
      padding: 1rem 1.05rem;
      min-height: 8.5rem;
      border-top-width: 5px;
      margin: 0;
    }

    .cover-main .cover-card--mint {
      border-top-color: var(--mint);
    }

    .cover-main .cover-card--sky {
      border-top-color: var(--sky);
    }

    .cover-main .cover-card--rose {
      border-top-color: var(--rose);
    }

    .cover-main .cover-card__label {
      margin: 0;
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.3;
      color: var(--ink);
    }

    .cover-main .cover-card__text {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
      font-weight: 600;
      flex: 1;
    }

    .cover-main .cover-card code {
      font-size: 0.8rem;
      padding: 0.05rem 0.3rem;
      word-break: break-word;
    }

    .cover-main .cover-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.85rem;
      padding-top: 0.25rem;
      border-top: 2px dashed rgba(17, 17, 17, 0.18);
    }

    .cover-main .cover-actions__secondary {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .cover-main .cover-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.5rem;
      padding: 0.65rem 1.1rem;
      border: 2px solid var(--ink);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none !important;
      transition: transform 120ms ease, box-shadow 120ms ease;
      white-space: nowrap;
    }

    .cover-main .cover-btn--primary {
      background: var(--accent);
      color: var(--ink) !important;
      box-shadow: 3px 3px 0 0 var(--ink);
    }

    .cover-main .cover-btn--secondary {
      background: var(--sky);
      color: var(--ink) !important;
      box-shadow: 3px 3px 0 0 var(--ink);
    }

    .cover-main .cover-btn--ghost {
      background: var(--paper);
      color: var(--ink) !important;
      box-shadow: 3px 3px 0 0 var(--ink);
    }

    .cover-main .cover-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 0 var(--ink);
    }

    .cover-main ul {
      display: none;
    }

    .search {
      border-bottom: 3px solid var(--ink) !important;
      margin: 0 !important;
      padding: 0.85rem !important;
      background: #fff4df !important;
    }

    .search input {
      border: 2px solid var(--ink) !important;
      border-radius: 0 !important;
      background: var(--paper) !important;
      font-weight: 600;
    }

    .search .clear-button {
      color: var(--ink) !important;
    }

    .docsify-pagination-container,
    .pagination-item {
      border-color: var(--ink) !important;
    }

    .app-sub-sidebar li::before {
      background: var(--accent) !important;
    }

    .medium-zoom-overlay {
      background: rgba(17, 17, 17, 0.88) !important;
    }

    @media (max-width: 768px) {
      :root {
        --docs-header-height: 112px;
      }

      .docs-header {
        flex-wrap: wrap;
        padding: 0.75rem 1rem;
      }

      #app {
        padding-top: 112px;
      }

      section.content,
      .content,
      body.ready section.content,
      body.ready .content {
        margin-left: 0 !important;
        padding-top: 0 !important;
      }

      body:not(.close) section.content,
      body:not(.close) .content,
      body.ready:not(.close) section.content,
      body.ready:not(.close) .content {
        margin-left: 0 !important;
      }

      .markdown-section {
        padding: 1.25rem 1rem 3rem;
      }

      .table-responsive {
        overflow-x: visible;
        border: 0;
        box-shadow: none;
        background: transparent;
        margin: 1rem 0;
      }

      .markdown-section table {
        min-width: 0;
        table-layout: auto;
      }

      .markdown-section table thead {
        display: none;
      }

      .markdown-section table tbody {
        display: block;
      }

      .markdown-section table tbody tr {
        display: block;
        margin-bottom: 0.85rem;
        border: 2px solid var(--ink);
        box-shadow: 3px 3px 0 0 var(--ink);
        background: var(--paper);
      }

      .markdown-section table tbody tr:nth-child(even) td {
        background: transparent;
      }

      .markdown-section table td {
        display: grid;
        grid-template-columns: minmax(6.25rem, 34%) 1fr;
        gap: 0.35rem 0.75rem;
        align-items: start;
        padding: 0.6rem 0.75rem;
        border: 0;
        border-bottom: 1px solid rgba(17, 17, 17, 0.14);
      }

      .markdown-section table td:last-child {
        border-bottom: 0;
      }

      .markdown-section table td::before {
        content: attr(data-label);
        font-weight: 800;
        font-size: 0.66rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink);
        line-height: 1.35;
      }

      .markdown-section table td > a,
      .markdown-section table td > code,
      .markdown-section table td > strong {
        min-width: 0;
      }

      .cover-shell {
        padding: 1.25rem 1rem;
      }

      .cover-main .cover-grid {
        grid-template-columns: 1fr;
      }

      .cover-main .cover-card {
        min-height: 0;
      }

      .cover-main .cover-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .cover-main .cover-actions__secondary {
        flex-direction: column;
        width: 100%;
      }

      .cover-main .cover-btn {
        width: 100%;
        justify-content: center;
      }

      .docs-header__actions .docs-btn--sky {
        display: none;
      }
    }
  </style>
</head>

<body class="close">
  <div id="docs-page-bg" aria-hidden="true"></div>
  <button type="button" class="docs-sidebar-backdrop" id="docs-sidebar-backdrop" aria-label="Tutup menu panduan" tabindex="-1"></button>

  <header class="docs-header">
    <div class="docs-header__start">
      <button
        type="button"
        class="docs-btn docs-btn--menu"
        id="docs-sidebar-toggle"
        aria-expanded="false"
        aria-controls="docs-sidebar"
        aria-label="Buka menu panduan"
      >
        <span class="docs-menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>
        <span class="docs-btn__label">Menu</span>
      </button>
      <a class="docs-header__brand" href="/">
        <img src="/arumanis.svg" alt="Arumanis" width="42" height="42">
        <div class="docs-header__title">
          <strong>Arumanis</strong>
          <span>Panduan Pengguna • Air Minum & Sanitasi Cianjur</span>
        </div>
      </a>
    </div>
    <div class="docs-header__actions">
      <a class="docs-btn docs-btn--sky" href="/pengawasan/">Panel Pengawasan</a>
      <a class="docs-btn docs-btn--primary" href="/sign-in">Masuk Aplikasi</a>
    </div>
  </header>

  <div id="app">Memuat panduan...</div>

  <script>
    window.$docsify = {
      name: 'Panduan Arumanis',
      repo: '',
      loadSidebar: true,
      coverpage: '_coverpage.md',
      onlyCover: true,
      subMaxLevel: 3,
      themeColor: '#fb8500',
      basePath: '/docs/',
      auto2top: true,
      search: {
        placeholder: 'Cari topik panduan...',
        noData: 'Tidak ada hasil',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Salin',
        errorText: 'Gagal',
        successText: 'Tersalin',
      },
      plugins: [
        function docsPageBackground(hook) {
          hook.doneEach(function () {
            document.documentElement.style.height = 'auto'
            document.body.style.height = 'auto'
            document.body.style.backgroundColor = 'transparent'
          })
          hook.ready(function () {
            document.documentElement.style.height = 'auto'
            document.body.style.height = 'auto'
            document.body.style.backgroundColor = 'transparent'
          })
        },
        function docsResponsiveTables(hook) {
          function enhanceTables() {
            document.querySelectorAll('.markdown-section table').forEach(function (table) {
              if (table.dataset.responsive === '1') return
              table.dataset.responsive = '1'

              var headers = []
              table.querySelectorAll('thead th').forEach(function (th) {
                headers.push(th.textContent.trim())
              })

              if (!headers.length) {
                var headerRow = table.querySelector('tr')
                if (headerRow) {
                  headerRow.querySelectorAll('th').forEach(function (th) {
                    headers.push(th.textContent.trim())
                  })
                }
              }

              table.querySelectorAll('tbody tr').forEach(function (row) {
                row.querySelectorAll('td').forEach(function (cell, index) {
                  if (!cell.getAttribute('data-label') && headers[index]) {
                    cell.setAttribute('data-label', headers[index])
                  }
                })
              })

              if (!table.parentElement || !table.parentElement.classList.contains('table-responsive')) {
                var wrap = document.createElement('div')
                wrap.className = 'table-responsive'
                table.parentNode.insertBefore(wrap, table)
                wrap.appendChild(table)
              }
            })
          }

          hook.ready(enhanceTables)
          hook.doneEach(enhanceTables)
        },
        function docsSidebarToggle(hook) {
          var STORAGE_KEY = 'arumanis-docs-sidebar-open'
          var bound = false

          function isCoverPage() {
            return !!document.querySelector('section.cover.show')
          }

          function isOpen() {
            return !document.body.classList.contains('close')
          }

          function setOpen(open, persist) {
            document.body.classList.toggle('close', !open)

            var toggleBtn = document.getElementById('docs-sidebar-toggle')
            var backdrop = document.getElementById('docs-sidebar-backdrop')

            if (toggleBtn) {
              toggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false')
              toggleBtn.setAttribute('aria-label', open ? 'Tutup menu panduan' : 'Buka menu panduan')
            }

            if (backdrop) {
              backdrop.classList.toggle('is-visible', open)
            }

            if (persist !== false) {
              localStorage.setItem(STORAGE_KEY, open ? 'open' : 'closed')
            }
          }

          function bindSidebarToggle() {
            if (bound) return
            bound = true

            var toggleBtn = document.getElementById('docs-sidebar-toggle')
            var backdrop = document.getElementById('docs-sidebar-backdrop')
            var sidebar = document.querySelector('.sidebar')

            if (sidebar) {
              sidebar.id = 'docs-sidebar'
            }

            if (toggleBtn) {
              toggleBtn.addEventListener('click', function () {
                setOpen(!isOpen())
              })
            }

            if (backdrop) {
              backdrop.addEventListener('click', function () {
                setOpen(false)
              })
            }

            document.addEventListener('keydown', function (event) {
              if (event.key === 'Escape' && isOpen()) {
                setOpen(false)
              }
            })
          }

          function bindSidebarNavClose() {
            document.querySelectorAll('.sidebar-nav a').forEach(function (link) {
              if (link.dataset.docsNavBound === '1') return
              link.dataset.docsNavBound = '1'
              link.addEventListener('click', function () {
                if (window.matchMedia('(max-width: 1024px)').matches) {
                  setOpen(false)
                }
              })
            })
          }

          hook.ready(function () {
            bindSidebarToggle()
            bindSidebarNavClose()
          })

          hook.doneEach(function () {
            bindSidebarNavClose()
            var sidebar = document.querySelector('.sidebar')
            if (sidebar && !sidebar.id) {
              sidebar.id = 'docs-sidebar'
            }

            if (isCoverPage()) {
              setOpen(false, false)
              return
            }

            var saved = localStorage.getItem(STORAGE_KEY)
            setOpen(saved === 'open', false)
          })
        },
      ],
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <style id="docsify-bg-override">
    html,
    body {
      height: auto !important;
      min-height: 100% !important;
    }

    html {
      background-color: #ebe4d8 !important;
      background-image: var(--docs-gradient) !important;
      background-attachment: fixed !important;
      background-repeat: no-repeat !important;
      background-size: 100% 100% !important;
    }

    body {
      background: transparent !important;
      background-color: transparent !important;
    }

    body.ready main,
    main,
    body.ready section.content,
    section.content,
    body.ready .content,
    .content,
    body.ready .markdown-section,
    .markdown-section,
    body.ready section.cover,
    section.cover,
    #app {
      background: transparent !important;
      background-color: transparent !important;
    }

    body.ready .sidebar,
    .sidebar {
      background: #fffdf8 !important;
      background-color: #fffdf8 !important;
    }

    .sidebar-toggle {
      display: none !important;
    }
  </style>
</body>
