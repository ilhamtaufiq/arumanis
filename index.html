<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  
  <!-- Preload LCP Image - Critical for Core Web Vitals -->
  <link rel="preload" as="image" href="/arumanis.svg" fetchpriority="high" />
  
  <!-- Preconnect to API server -->
  <link rel="preconnect" href="https://apiamis.cianjur.space" crossorigin />
  
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon_light.svg" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="/images/favicon.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="/images/favicon_light.png" media="(prefers-color-scheme: dark)" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>Arumanis</title>
  <meta name="title" content="Arumanis" />
  <meta name="description" content="Bidang Air Minum dan Sanitasi" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="arumanis.cianjur.space" />
  <meta property="og:title" content="Arumanis" />
  <meta property="og:description" content="Bidang Air Minum dan Sanitasi" />
  <meta property="og:image" content="https://arumanis.cianjur.space" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="arumanis.cianjur.space" />
  <meta property="twitter:title" content="Arumanis" />
  <meta property="twitter:description" content="Bidang Air Minum dan Sanitasi" />
  <meta property="twitter:image" content="https://arumanis.cianjur.space" />

  <!-- Google Fonts - Non-blocking loading with preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preload fonts to prevent blocking -->
  <link rel="preload" as="style" 
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" />
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet" 
    media="print" 
    onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" />
  </noscript>

  <meta name="theme-color" content="#fff" />

  <!-- Early build freshness check — runs before the main bundle. -->
  <script>
    (function () {
      try {
        var servedMeta = document.querySelector('meta[name="app-build-id"]');
        var servedId = servedMeta && servedMeta.content;
        if (!servedId) return;

        var storageKey = 'arumanis-app-build-id';
        var pendingKey = 'arumanis-reload-pending';
        var attemptKey = 'arumanis-reload-attempt';
        var lockKey = 'arumanis-reload-lock';
        var maxAttempts = 3;
        var lastKnown = localStorage.getItem(storageKey);

        function showBootOverlay() {
          var overlay = document.getElementById('boot-update-overlay');
          if (overlay) overlay.style.display = 'flex';
        }

        function hardReload() {
          var url = new URL(window.location.href);
          url.searchParams.set('_cb', Date.now().toString(36));
          window.location.replace(url.toString());
        }

        async function clearClientCaches() {
          if ('caches' in window) {
            try {
              var names = await caches.keys();
              await Promise.all(names.map(function (name) { return caches.delete(name); }));
            } catch (e) { /* ignore */ }
          }
          if ('serviceWorker' in navigator) {
            try {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function (reg) { return reg.unregister(); }));
            } catch (e) { /* ignore */ }
          }
        }

        async function runStaleBuildReload() {
          var attempts = Number(sessionStorage.getItem(attemptKey) || '0') + 1;
          if (attempts > maxAttempts) {
            sessionStorage.removeItem(pendingKey);
            return;
          }

          sessionStorage.setItem(attemptKey, String(attempts));
          sessionStorage.setItem(pendingKey, '1');
          sessionStorage.setItem(lockKey, String(Date.now()));
          showBootOverlay();
          await clearClientCaches();
          hardReload();
        }

        if (sessionStorage.getItem(pendingKey) === '1') {
          showBootOverlay();
        }

        if (lastKnown && lastKnown !== servedId) {
          localStorage.setItem(storageKey, servedId);
          runStaleBuildReload();
          return;
        }

        if (servedId) {
          localStorage.setItem(storageKey, servedId);
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>

<body>
  <div
    id="boot-update-overlay"
    style="display:none;position:fixed;inset:0;z-index:99999;align-items:center;justify-content:center;background:rgba(255,255,255,0.92);font-family:system-ui,sans-serif;"
  >
    <div style="text-align:center;padding:1.5rem;">
      <p style="margin:0 0 0.5rem;font-weight:600;">Memperbarui aplikasi</p>
      <p style="margin:0;color:#666;font-size:0.875rem;">Versi terbaru sedang dimuat...</p>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
